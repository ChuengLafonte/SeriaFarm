# SeriaFarm Regions Configuration
# Use this to define regions and their settings
regions:
  Global:
    display-name: "&#ffa500Global"
    enabled: true
    per-region-regen: true
    require-permission: false
    allow-block-place: false
    teleport-location: "world;0;100;0;0;0"
  TestRegion:
    display-name: "&#ffa500Test Region"
    enabled: true
    per-region-regen: false
    require-permission: true
    allow-block-place: false
    teleport-location: "world;100;100;100;0;0"
