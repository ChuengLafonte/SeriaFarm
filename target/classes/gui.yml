# SeriaFarm GUI Configuration
# This file defines the layout and items for all plugin menus.

main_menu:
  title: "&#fbca00&lSeriaFarm Main Menu"
  size: 36
  items:
    toggle:
      material: GREEN_WOOL
      slot: 11
      name: "&#fbca00Toggle Menu"
      lore: ["&7Enable or Disable Plugin Features"]
    prefix:
      material: NAME_TAG
      slot: 13
      name: "&#fbca00Plugin Prefix"
      lore: ["&7Set the prefix for messages", "&7Customizable via chat input."]
    add:
      material: NETHER_STAR
      slot: 15
      name: "&#fbca00Add More Blocks"
      lore: ["&7Add more blocks to regeneration.", "&7Choose which region blocks should be added."]
    wand:
      material: STONE_AXE
      slot: 20
      custom-model-data: 20
      name: "&#fbca00Regen Wand"
      lore: ["&7Receive a regen wand.", "&7Used to select Pos1 and Pos2."]
    reload:
      material: CLOCK
      slot: 22
      name: "&#fbca00Reload Plugin"
      lore: ["&7Reloads the plugin configurations."]
    edit:
      material: DIAMOND_ORE
      slot: 24
      name: "&#fbca00Edit Menu"
      lore: ["&7Edit how the block regenerates.", "&7Choose which region blocks should be edited."]
    exit:
      material: BARRIER
      slot: 35
      name: "&cClose | Exit"
      lore: ["&7Closes the current GUI."]

