# ----------------------------------------------------------------
# SeriaFarm Materials Configuration
# ----------------------------------------------------------------
# Structure:
# blocks:
#   global:
#     - Applied server-wide if not inside a specific region.
#   [region_name]:
#     - Overrides global settings within this region.
# ----------------------------------------------------------------

blocks:
  global:
    # --- Standard Crops (Ageable) ---
    wheat:
      material: WHEAT
      regen-delay: 60
    carrots:
      material: CARROTS
      regen-delay: 60
    potatoes:
      material: POTATOES
      regen-delay: 60
    beetroots:
      material: BEETROOTS
      regen-delay: 60
    nether_wart:
      material: NETHER_WART
      regen-delay: 90
    cocoa:
      material: COCOA
      regen-delay: 90
    
    # --- Plants & Stalks ---
    sugar_cane:
      material: SUGAR_CANE
      regen-delay: 45
    cactus:
      material: CACTUS
      regen-delay: 45
    bamboo:
      material: BAMBOO
      regen-delay: 45
    kelp:
      material: KELP
      regen-delay: 45
    
    # --- Fruits ---
    melon:
      material: MELON
      regen-delay: 120
    pumpkin:
      material: PUMPKIN
      regen-delay: 120
    
    # --- Berries & Vines ---
    sweet_berry_bush:
      material: SWEET_BERRY_BUSH
      regen-delay: 60
    cave_vines:
      material: CAVE_VINES
      regen-delay: 90
    cave_vines_plant:
      material: CAVE_VINES_PLANT
      regen-delay: 90

    # --- Special ---
    amethyst_cluster:
      material: AMETHYST_CLUSTER
      regen-delay: 300

  # Example Region Overrides
  mining_zone_1:
    diamond_ore:
      material: DIAMOND_ORE
      regen-delay: 600
      rewards:
        xp: 50
    gold_ore:
      material: GOLD_ORE
      regen-delay: 300

  # Legacy / Standalone entries (Supported but 'global' is preferred)
  lapis_ore:
    material: LAPIS_ORE
    regen-delay: 15
    rewards:
      xp: 10
