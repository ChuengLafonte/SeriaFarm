# SeriaFarm General Configuration
settings:
  database-type: SQLITE
  debug: true
  action-bar: true
  show-growth-actionbar: true
  harvest-click: true # Right-click to harvest
  worldguard-bypass: true
  # Growth Settings
  # INSTANT: Block restores immediately after delay (default for most blocks)
  # VANILLA: Block grows in phases (Ageable crops, Amethyst, Bamboo)
  crop-growth-mode: VANILLA
  global-level-scaling: 0.1 # Bonus chance per farming level
  global-replant: true
  
  # XP System: VANILLA, AURASKILLS, MCMMO, MMOCORE
  xp-engine: VANILLA
  # Skill ID for RPG plugins (lowercase 'farming' for AuraSkills)
  xp-skill-id: farming
  
  # Interval in seconds for water decay and growth visual updates
  decay-tick-interval: 60
  growth-tick-interval: 2
  # Smoothness of Regional/Global regeneration (Seconds). 0.5s is recommended.
  regen-tick-interval: 0.5

# Integration settings
hooks:
  mmoitems: true
  auraskills: true
  itemsadder: true
  oraxen: true
  nexo: true

# ─── Composted Soil Slot System ──────────────────────────────────────────────
# Controls how many Composted Soil blocks a player can place.
# Bonus slots are given when a player's Farming level reaches a threshold.
composted-soil:
  base-slots: 9
  identifier: "mi:MATERIAL:COMPOSTED_SOIL"
  # Level thresholds: Farming level required → total bonus slots
  # Only the HIGHEST applicable threshold counts (not cumulative).
  level-thresholds:
    10: 3
    20: 8
    30: 15
    50: 25

# ─── Watering Tools ──────────────────────────────────────────────────────────
# Define all items that can be used as watering tools.
# identifier : vanilla material name, or "mi:TYPE:ID" / "ia:namespace:id"
# per-use    : how much watering_level is added to the plant per click
# capacity   : max charges before the tool becomes empty
# empty-item : item replaced after capacity hits 0
watering-tools:
  tools:
    - identifier: WATER_BUCKET
      display-name: "Water Bucket"
      per-use: 5
      capacity: 1
      empty-item: BUCKET
